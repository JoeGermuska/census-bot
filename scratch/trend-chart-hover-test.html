<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>TrendChart hover test — open and hover each chart</title>
<style>
  body {
    margin: 0; padding: 32px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: #f8fafc; color: #0f172a;
  }
  h1 { font-family: Georgia, serif; font-size: 22px; margin: 0 0 6px; }
  h2 { font-family: Georgia, serif; font-size: 18px; margin: 28px 0 6px; }
  .subtitle { color: #64748b; font-size: 13px; margin: 0 0 18px; }
  .scenarios { display: grid; gap: 28px; max-width: 900px; }
  .scenario {
    padding: 20px 24px; background: #fff;
    border: 1px solid #e2e8f0; border-radius: 8px;
  }
  .desc { font-size: 12px; color: #64748b; margin-bottom: 12px; line-height: 1.55; }
  .desc strong { color: #0f172a; }
  /* Lifted from the React component so the standalone behaves the same. */
  :root {
    --chart-tick: #475569;
    --chart-muted: #64748b;
    --chart-surface: #ffffff;
    --accent: #1a4480;
    --text: #0f172a;
    --chart-grid: #e2e8f0;
  }
  .pass-marker { color: #16a34a; font-weight: 700; }
  .fail-marker { color: #dc2626; font-weight: 700; }
</style>
</head>
<body>

<h1>TrendChart hover test bench</h1>
<p class="subtitle">
  Hover any year column on the charts below. Each chart exercises a different
  edge case in the hover / annotation logic. The behavior expected for each is
  noted under the title — verify it matches.
</p>

<div class="scenarios" id="root"></div>

<script type="module">
// Mini React-free re-implementation of the chart's render logic so the
// standalone matches the live component byte-for-byte on the geometry it
// produces. State is kept inside each chart instance.

const SERIES_COLORS = ["#1a4480", "#2378c3", "#5b8ec5", "#7aa7d9"];

function formatValueForMetric(rawValue, metric) {
  if (!Number.isFinite(rawValue)) return "N/A";
  if (/income|rent|value/i.test(metric)) {
    return new Intl.NumberFormat("en-US", { style: "currency", currency: "USD", maximumFractionDigits: 0 }).format(rawValue);
  }
  if (/rate|percent/i.test(metric)) return rawValue.toFixed(1) + "%";
  return new Intl.NumberFormat("en-US").format(Math.round(rawValue));
}

function formatYTick(rawValue, metric, step) {
  const decimalsForStep = (s) => {
    if (s == null) return 0;
    if (s >= 1000) return 0;
    if (s >= 100) return 1;
    return 2;
  };
  const isCurrency = /income|rent|value/i.test(metric);
  const isPercent  = /rate|percent/i.test(metric);
  if (isCurrency) {
    if (rawValue >= 1_000_000) return "$" + (rawValue/1_000_000).toFixed(1) + "M";
    if (rawValue >= 1000) return "$" + (rawValue/1000).toFixed(decimalsForStep(step)) + "k";
    return "$" + rawValue;
  }
  if (isPercent) {
    if (step != null && step < 1) return rawValue.toFixed(1) + "%";
    return Math.round(rawValue) + "%";
  }
  if (rawValue >= 1000) return (rawValue/1000).toFixed(decimalsForStep(step)) + "k";
  return String(Math.round(rawValue));
}

function niceStep(roughStep) {
  const exp = Math.floor(Math.log10(Math.abs(roughStep) || 1));
  const base = Math.pow(10, exp);
  const norm = roughStep / base;
  let nice;
  if (norm < 1.5) nice = 1;
  else if (norm < 3) nice = 2;
  else if (norm < 7) nice = 5;
  else nice = 10;
  return nice * base;
}

function pctChange(from, to) {
  if (!Number.isFinite(from) || !Number.isFinite(to) || Math.abs(from) < 1) return null;
  return ((to - from) / from) * 100;
}

function makeChart({ container, metric, location, series, expanded = false }) {
  const W = 760;
  const H = expanded ? 380 : 320;
  const PT = 36, PB = 44, PL = 64;
  const isMulti = series.length > 1;
  const PR = isMulti ? 96 : 36;

  const allYears = Array.from(new Set(series.flatMap(s => s.points.map(p => p.year)))).sort((a,b) => a-b);
  const xs = (year) => {
    if (allYears.length <= 1) return PL;
    const idx = allYears.indexOf(year);
    return PL + (idx * (W - PL - PR)) / (allYears.length - 1);
  };

  const all = series.flatMap(s => s.points.map(p => p.numericValue));
  const dataMin = Math.min(...all), dataMax = Math.max(...all);
  const padTop = (dataMax - dataMin) * 0.15 || dataMax * 0.15 || 1;
  const padBottom = (dataMax - dataMin) * 0.05 || 0;
  const minV = Math.max(0, dataMin - padBottom);
  const maxV = dataMax + padTop;
  const span = maxV - minV;
  const step = niceStep(span / 3);
  const yTicks = [];
  let t = Math.ceil(minV / step) * step;
  while (t <= maxV && yTicks.length < 5) { yTicks.push(t); t += step; }

  const ys = (v) => PT + ((maxV - v) / (maxV - minV || 1)) * (H - PT - PB);

  // Header
  const titleEl = document.createElement("h2");
  titleEl.textContent = metric + (location ? " · " + location : "");
  container.appendChild(titleEl);

  let lede = document.createElement("p");
  lede.style.cssText = "font-size: 12px; color: #475569; margin: 0 0 14px; line-height: 1.55;";
  if (isMulti) {
    lede.innerHTML = `Comparing <strong>${series.length} places</strong> (${series.map(s => s.label).join(" · ")}) from ${allYears[0]} to ${allYears[allYears.length-1]}.`;
  } else {
    const pts = series[0].points;
    if (pts.length >= 2) {
      const first = pts[0], last = pts[pts.length - 1];
      const delta = pctChange(first.numericValue, last.numericValue);
      lede.innerHTML = delta != null
        ? `<strong style="color:#1a4480">${delta >= 0 ? 'Up' : 'Down'} ${Math.abs(delta).toFixed(1)}%</strong> from ${formatValueForMetric(first.numericValue, metric)} (${first.year}) to ${formatValueForMetric(last.numericValue, metric)} (${last.year}).`
        : `${formatValueForMetric(first.numericValue, metric)} (${first.year}) to ${formatValueForMetric(last.numericValue, metric)} (${last.year}).`;
    }
  }
  container.appendChild(lede);

  // SVG
  const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
  svg.setAttribute("viewBox", `0 0 ${W} ${H}`);
  svg.style.cssText = "width: 100%; height: auto; display: block; overflow: visible;";
  container.appendChild(svg);

  let hoverYear = null;
  function render() {
    svg.innerHTML = "";

    // Y grid + labels
    yTicks.forEach(tick => {
      const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
      line.setAttribute("x1", PL); line.setAttribute("x2", W - PR);
      line.setAttribute("y1", ys(tick)); line.setAttribute("y2", ys(tick));
      line.setAttribute("stroke", "#0f172a"); line.setAttribute("stroke-opacity", "0.1");
      svg.appendChild(line);
      const txt = document.createElementNS("http://www.w3.org/2000/svg", "text");
      txt.setAttribute("x", PL - 8); txt.setAttribute("y", ys(tick));
      txt.setAttribute("text-anchor", "end"); txt.setAttribute("dominant-baseline", "middle");
      txt.setAttribute("font-size", "10"); txt.setAttribute("fill", "#64748b");
      txt.style.fontVariantNumeric = "tabular-nums";
      txt.textContent = formatYTick(tick, metric, step);
      svg.appendChild(txt);
    });

    // Vertical year grid (faint)
    allYears.forEach(year => {
      const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
      line.setAttribute("x1", xs(year)); line.setAttribute("x2", xs(year));
      line.setAttribute("y1", PT); line.setAttribute("y2", H - PB);
      line.setAttribute("stroke", "#0f172a"); line.setAttribute("stroke-opacity", "0.04");
      svg.appendChild(line);
    });

    // Series
    series.forEach((s, sIdx) => {
      const color = SERIES_COLORS[sIdx % SERIES_COLORS.length];
      const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
      path.setAttribute("d", s.points.map((p, i) => `${i===0?"M":"L"} ${xs(p.year)} ${ys(p.numericValue)}`).join(" "));
      path.setAttribute("fill", "none"); path.setAttribute("stroke", color);
      path.setAttribute("stroke-width", "1.75");
      path.setAttribute("stroke-linejoin", "round"); path.setAttribute("stroke-linecap", "round");
      svg.appendChild(path);

      // Single-series: per-point dots + permanent value labels
      if (!isMulti) {
        s.points.forEach((p, i) => {
          const above = i % 2 === 0;
          const x = xs(p.year), y = ys(p.numericValue);
          const isHover = hoverYear === p.year;
          const isFirst = i === 0, isLast = i === s.points.length - 1;
          const dot = document.createElementNS("http://www.w3.org/2000/svg", "circle");
          dot.setAttribute("cx", x); dot.setAttribute("cy", y);
          dot.setAttribute("r", isHover ? 4.5 : 3); dot.setAttribute("fill", color);
          dot.setAttribute("stroke", "#fff"); dot.setAttribute("stroke-width", "1.5");
          svg.appendChild(dot);
          const lbl = document.createElementNS("http://www.w3.org/2000/svg", "text");
          lbl.setAttribute("x", x + (isFirst ? 4 : isLast ? -4 : 0));
          lbl.setAttribute("y", above ? y - 12 : y + 21);
          lbl.setAttribute("text-anchor", isFirst ? "start" : isLast ? "end" : "middle");
          lbl.setAttribute("font-size", "10"); lbl.setAttribute("font-weight", isHover ? 700 : 500);
          lbl.setAttribute("fill", isHover ? "#0f172a" : "#475569");
          lbl.style.fontVariantNumeric = "tabular-nums";
          lbl.textContent = formatValueForMetric(p.numericValue, metric);
          svg.appendChild(lbl);
        });
      } else {
        // Multi-series: end-of-line annotation
        if (s.points.length > 0) {
          const last = s.points[s.points.length - 1];
          const lx = xs(last.year), ly = ys(last.numericValue);
          const dot = document.createElementNS("http://www.w3.org/2000/svg", "circle");
          dot.setAttribute("cx", lx); dot.setAttribute("cy", ly);
          dot.setAttribute("r", 3.5); dot.setAttribute("fill", color);
          dot.setAttribute("stroke", "#fff"); dot.setAttribute("stroke-width", "1.5");
          svg.appendChild(dot);
          const lbl = document.createElementNS("http://www.w3.org/2000/svg", "text");
          lbl.setAttribute("x", lx + 6); lbl.setAttribute("y", ly);
          lbl.setAttribute("text-anchor", "start"); lbl.setAttribute("dominant-baseline", "middle");
          lbl.setAttribute("font-size", "10"); lbl.setAttribute("font-weight", 700);
          lbl.setAttribute("fill", color);
          lbl.style.fontVariantNumeric = "tabular-nums";
          lbl.textContent = formatValueForMetric(last.numericValue, metric);
          svg.appendChild(lbl);
        }

        // Multi-series hover labels
        if (hoverYear != null) {
          const lastYear = s.points[s.points.length - 1]?.year;
          if (hoverYear !== lastYear) {
            const hp = s.points.find(p => p.year === hoverYear);
            if (hp) {
              const hx = xs(hp.year), hy = ys(hp.numericValue);
              const dot = document.createElementNS("http://www.w3.org/2000/svg", "circle");
              dot.setAttribute("cx", hx); dot.setAttribute("cy", hy);
              dot.setAttribute("r", 4.5); dot.setAttribute("fill", color);
              dot.setAttribute("stroke", "#fff"); dot.setAttribute("stroke-width", "1.5");
              svg.appendChild(dot);
              const lbl = document.createElementNS("http://www.w3.org/2000/svg", "text");
              lbl.setAttribute("x", hx); lbl.setAttribute("y", hy - 10);
              lbl.setAttribute("text-anchor", "middle");
              lbl.setAttribute("font-size", "10"); lbl.setAttribute("font-weight", 700);
              lbl.setAttribute("fill", color);
              lbl.style.fontVariantNumeric = "tabular-nums";
              lbl.textContent = formatValueForMetric(hp.numericValue, metric);
              svg.appendChild(lbl);
            }
          }
        }
      }
    });

    // X-axis
    allYears.forEach((year, i) => {
      const isLast = i === allYears.length - 1;
      const t = document.createElementNS("http://www.w3.org/2000/svg", "text");
      t.setAttribute("x", xs(year)); t.setAttribute("y", H - PB + 16);
      t.setAttribute("text-anchor", "middle"); t.setAttribute("font-size", "10");
      t.setAttribute("fill", (!isMulti && isLast) ? "#1a4480" : "#64748b");
      t.setAttribute("font-weight", (!isMulti && isLast) ? 700 : 500);
      t.style.fontVariantNumeric = "tabular-nums";
      t.textContent = year;
      svg.appendChild(t);
    });

    // Hit rects — width is year-to-year gap (denominator N-1) so they tile cleanly.
    const rectW = allYears.length > 1
      ? (W - PL - PR) / (allYears.length - 1)
      : (W - PL - PR);
    allYears.forEach(year => {
      const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
      rect.setAttribute("x", xs(year) - rectW/2); rect.setAttribute("y", PT - 6);
      rect.setAttribute("width", rectW); rect.setAttribute("height", H - PT - PB + 12);
      rect.setAttribute("fill", "transparent"); rect.style.cursor = "crosshair";
      rect.addEventListener("mouseenter", () => { hoverYear = year; render(); });
      svg.appendChild(rect);
    });

    if (hoverYear != null) {
      const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
      line.setAttribute("x1", xs(hoverYear)); line.setAttribute("x2", xs(hoverYear));
      line.setAttribute("y1", PT); line.setAttribute("y2", H - PB);
      line.setAttribute("stroke", "#1a4480"); line.setAttribute("stroke-width", "1");
      line.setAttribute("stroke-dasharray", "2 3"); line.setAttribute("pointer-events", "none");
      svg.appendChild(line);
    }
  }
  svg.addEventListener("mouseleave", () => { hoverYear = null; render(); });
  render();
}

// ─── Test scenarios ─────────────────────────────────────────────────────────

function scenario(title, desc, mountFn) {
  const root = document.getElementById("root");
  const wrap = document.createElement("div");
  wrap.className = "scenario";
  const t = document.createElement("h2"); t.textContent = title; wrap.appendChild(t);
  const d = document.createElement("p"); d.className = "desc"; d.innerHTML = desc; wrap.appendChild(d);
  const chartHost = document.createElement("div"); wrap.appendChild(chartHost);
  root.appendChild(wrap);
  mountFn(chartHost);
}

// 1. Multi-series, both lines aligned (the user's screenshot)
scenario(
  "1. Multi-series — Irvine vs San Diego rent",
  "<strong>Expected on hover:</strong> dashed vertical line at hovered year + dot " +
  "+ value label per series (e.g. <code>$2,640</code> in dark blue near Irvine's dot, " +
  "<code>$2,015</code> in lighter blue near San Diego's). End-of-line labels at right " +
  "edge ($2,997 / $2,313). Y-axis: distinct $-amounts (no '$3k, $3k, $2k, $2k' collapse).",
  (host) => makeChart({
    container: host,
    metric: "Median Gross Rent",
    location: "Irvine, California vs San Diego, California",
    series: [
      { label: "Irvine, California", points: [
        {year:2015,numericValue:1903},{year:2016,numericValue:1985},{year:2017,numericValue:2074},
        {year:2018,numericValue:2189},{year:2019,numericValue:2308},{year:2020,numericValue:2420},
        {year:2021,numericValue:2560},{year:2022,numericValue:2720},{year:2023,numericValue:2872},
        {year:2024,numericValue:2997},
      ]},
      { label: "San Diego, California", points: [
        {year:2015,numericValue:1377},{year:2016,numericValue:1456},{year:2017,numericValue:1531},
        {year:2018,numericValue:1620},{year:2019,numericValue:1715},{year:2020,numericValue:1812},
        {year:2021,numericValue:1924},{year:2022,numericValue:2058},{year:2023,numericValue:2192},
        {year:2024,numericValue:2313},
      ]}
    ],
  })
);

// 2. Single-series — verify nothing broke
scenario(
  "2. Single-series — Austin median rent",
  "<strong>Expected on hover:</strong> the value label at the hovered year goes from " +
  "weight-500 to weight-700 (subtle bold). All values labels are visible permanently. " +
  "Y-axis: distinct values across small steps.",
  (host) => makeChart({
    container: host,
    metric: "Median Gross Rent",
    location: "Austin, Texas",
    series: [
      { label: "Austin, Texas", points: [
        {year:2018,numericValue:1225},{year:2019,numericValue:1280},{year:2020,numericValue:1346},
        {year:2021,numericValue:1415},{year:2022,numericValue:1549},{year:2023,numericValue:1655},
        {year:2024,numericValue:1729},
      ]}
    ],
  })
);

// 3. Multi-series with mismatched year ranges
scenario(
  "3. Multi-series with gaps — one line ends earlier",
  "<strong>Expected on hover:</strong> when hovering on years where one series has no " +
  "data, only the other series shows a hover label. Hovering on years both series have, " +
  "both labels appear.",
  (host) => makeChart({
    container: host,
    metric: "Population",
    location: "City A vs City B",
    series: [
      { label: "City A (full range)", points: [
        {year:2018,numericValue:120000},{year:2019,numericValue:125000},{year:2020,numericValue:131000},
        {year:2021,numericValue:138000},{year:2022,numericValue:144000},{year:2023,numericValue:149000},
        {year:2024,numericValue:155000},
      ]},
      { label: "City B (truncated)", points: [
        {year:2020,numericValue:80000},{year:2021,numericValue:84000},{year:2022,numericValue:88000},
      ]}
    ],
  })
);

// 4. Tight Y-range that previously collapsed Y-tick labels
scenario(
  "4. Tight Y-range — was producing '$3k, $3k, $2k, $2k'",
  "<strong>Expected:</strong> Y-axis labels show distinct values like " +
  "<code>$1.5k</code>, <code>$2.0k</code>, <code>$2.5k</code>, <code>$3.0k</code> — " +
  "no two labels render as the same string.",
  (host) => makeChart({
    container: host,
    metric: "Median Gross Rent",
    location: "Comparison range",
    series: [
      { label: "Series A", points: [
        {year:2020,numericValue:1900},{year:2021,numericValue:2100},{year:2022,numericValue:2400},
        {year:2023,numericValue:2700},{year:2024,numericValue:3000},
      ]},
      { label: "Series B", points: [
        {year:2020,numericValue:1700},{year:2021,numericValue:1850},{year:2022,numericValue:2050},
        {year:2023,numericValue:2300},{year:2024,numericValue:2550},
      ]}
    ],
  })
);

// 5. Percentage with sub-1% step
scenario(
  "5. Percentage with tight steps",
  "<strong>Expected:</strong> Y-axis shows decimals like <code>14.2%</code>, <code>14.4%</code>, " +
  "<code>14.6%</code>, <code>14.8%</code> — not collapsed to integer percent.",
  (host) => makeChart({
    container: host,
    metric: "Poverty rate",
    location: "Tight-range city",
    series: [
      { label: "Place X", points: [
        {year:2018,numericValue:14.2},{year:2019,numericValue:14.3},{year:2020,numericValue:14.5},
        {year:2021,numericValue:14.6},{year:2022,numericValue:14.7},{year:2023,numericValue:14.8},
      ]}
    ],
  })
);

// 6. Single-data-point edge case
scenario(
  "6. Single-point series — degenerate case",
  "<strong>Expected:</strong> renders without crashing. No line drawn, just one dot. " +
  "Hover should be a no-op.",
  (host) => makeChart({
    container: host,
    metric: "Median household income",
    location: "Edge case",
    series: [{ label: "One year only", points: [{year:2024,numericValue:62000}] }],
  })
);
</script>

</body>
</html>
